<!-- {{pessoas[2].name}} -->
<div class="greasy" *ngFor="let f_food of festFood; track: $index">
    <div class="card">

        <div class="carossell">
            <div class="title">
                {{f_food.name}}
            </div>
            <img [src]="f_food.image" alt="Imagem dinamica" width="350px" height="200px">
        </div>

        <div class="txt">R${{f_food.price}} <br></div>
        <div class="description">{{f_food.description}}</div>
    </div>

</div>
